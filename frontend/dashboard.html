<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NightEat - Dashboard</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/admin-extra.css" />
</head>
<body style="background: #f8fafc;">
  <div class="dashboard-container">
    <header class="dashboard-header">
      <div style="display: flex; align-items: center; gap: 15px;">
        <img src="pagene.png" alt="NightEat Logo" style="width: 45px; height: auto;" />
        <h1 style="font-family: 'Outfit'; color: var(--text-main); margin: 0;">Dashboard</h1>
      </div>
      <div style="display: flex; gap: 15px;">
        <button id="showMenuBtn" class="filter-btn active" onclick="switchSection('menu')">Menu</button>
        <button id="showOrdersBtn" class="filter-btn" onclick="switchSection('orders')">Orders</button>
        <button id="takeParcelBtnHeader" class="filter-btn parcel-btn-header" onclick="openTakeOrderModal()" style="display: flex; align-items: center; gap: 8px;">
          <span>🛍️</span> Parcel Order
        </button>
      </div>
      <button id="logoutBtn" class="logout-btn">Logout</button>
    </header>

    <!-- Menu Management Section -->
    <div id="menuSection" class="dashboard-grid">
      <!-- Left Column: Add New Item -->
      <aside class="dashboard-card reveal">
        <h2>Add New Dish</h2>
        <form id="addItemForm" enctype="multipart/form-data">
          <div class="form-group">
            <label>Item Name</label>
            <input type="text" id="itemName" placeholder="e.g. Paneer Tikka" required />
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea id="description" rows="3" placeholder="Describe the flavors..."></textarea>
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px;">
            <div class="form-group" style="margin-bottom:0;">
              <label>Category</label>
              <div style="display: flex; gap: 10px; align-items: center;">
                <select id="category" required style="flex-grow: 1;">
                  <option value="" disabled selected>Loading...</option>
                </select>
                <button type="button" onclick="toggleAddCategory()" class="small-btn" style="min-width: 42px; height: 42px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; background: rgba(212, 93, 38, 0.1); color: var(--primary); border: 1px solid rgba(212, 93, 38, 0.2); border-radius: 10px;">
                  +
                </button>
              </div>
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label>Food Type</label>
              <select id="foodType" required>
                <option value="" disabled selected>Select Type</option>
                <option value="Veg">Pure Veg</option>
                <option value="Non-Veg">Non-Veg</option>
              </select>
            </div>
          </div>
          
          <!-- Inline Add Category Input (Hidden by default) -->
          <div id="newCategoryContainer" style="display: none; margin: -10px 0 25px 0; padding: 18px; background: rgba(15, 23, 42, 0.6); border-radius: 16px; border: 1px solid rgba(212, 93, 38, 0.2); gap: 12px; animation: cosmicReveal 0.4s var(--ease-out-back); box-shadow: 0 10px 30px rgba(0,0,0,0.3); flex-direction: row; align-items: center;">
            <input type="text" id="newCategoryName" placeholder="Enter new category name..." style="flex-grow: 1; height: 45px; font-size: 0.95rem; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 0 15px; border-radius: 10px; outline: none; transition: 0.3s;" onfocus="this.style.borderColor='var(--primary)'" onblur="this.style.borderColor='rgba(255,255,255,0.1)'" />
            <button type="button" onclick="saveNewCategory()" class="primary-btn" style="width: auto; padding: 0 25px; height: 45px; font-size: 0.9rem; margin-top: 0; box-shadow: var(--shadow-premium);">
              Add Item
            </button>
          </div>
          <div class="form-group">
            <label>Price (Default/Single)</label>
            <input type="number" step="0.01" id="price" placeholder="Enter default price" required>
          </div>
          <!-- Multi-Pricing for Grill/Tandoori -->
          <div id="tieredPriceContainer" style="display: none; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px;">
            <div class="form-group" style="margin-bottom:0;">
              <label style="font-size: 0.75rem;">Price (Quarter)</label>
              <input type="number" step="0.01" id="price_quarter" placeholder="Quarter">
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label style="font-size: 0.75rem;">Price (Half)</label>
              <input type="number" step="0.01" id="price_half" placeholder="Half">
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label style="font-size: 0.75rem;">Price (Full)</label>
              <input type="number" step="0.01" id="price_full" placeholder="Full">
            </div>
          </div>
          <div class="form-group">
            <label>Upload Image</label>
            <input type="file" id="itemImage" accept="image/*" />
          </div>
          <div style="display: flex; gap: 20px; margin-bottom: 25px;">
            <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer;">
              <input type="checkbox" id="isSpecial" style="width: 18px; height: 18px; accent-color: var(--primary);" /> Special
            </label>
            <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer;">
              <input type="checkbox" id="isAvailable" checked style="width: 18px; height: 18px; accent-color: var(--primary);" /> Available
            </label>
          </div>
          <button type="submit" class="primary-btn">Create Item</button>
        </form>
        <p id="statusMessage" class="message-text"></p>
      </aside>

      <!-- Right Column: Menu Items List -->
      <section class="dashboard-card reveal" style="animation-delay: 0.1s;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px;">
          <h2 style="margin: 0; border: none; padding: 0;">Manage Menu Items</h2>
          <div style="display: flex; align-items: center; gap: 10px;">
            <label style="font-size: 0.8rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">Filter By:</label>
            <select id="adminCategoryFilter" onchange="filterAdminMenu()" style="padding: 8px 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: var(--text-main); font-size: 0.85rem; outline: none; cursor: pointer; min-width: 150px;">
              <option value="All" selected>Loading...</option>
            </select>
          </div>
        </div>
        <div id="adminMenuList" class="admin-menu-list">
          <!-- Items will be injected here as modern list cards -->
          <p style="text-align: center; color: var(--text-muted); padding: 40px;">Loading your menu...</p>
        </div>
      </section>
    </div>

    <!-- Orders Management Section -->
    <div id="ordersSection" style="display: none;">
      <section class="dashboard-card reveal">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 20px;">
          <h2 style="margin:0;">Incoming Orders</h2>
          
          <div class="date-filter-wrapper">
            <div class="date-input-group">
              <span class="date-label">Select Date</span>
              <input type="date" id="orderDate" class="date-input" onchange="loadOrders()" />
            </div>
            <div style="width: 1px; height: 20px; background: rgba(255,255,255,0.1);"></div>
          </div>

          <button class="refresh-btn" onclick="loadOrders()">
            <span class="refresh-icon">🔄</span> Refresh
          </button>
        </div>
        <div id="adminOrdersList" class="admin-menu-list">
          <p style="text-align: center; color: var(--text-muted); padding: 40px;">No orders yet.</p>
        </div>
      </section>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="editModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Edit Dish Details</h2>
        <button class="close-btn" onclick="closeEditModal()">&times;</button>
      </div>
      
      <form id="editItemForm" enctype="multipart/form-data">
        <input type="hidden" id="editItemId" />
        
        <div class="form-group">
          <label>Item Name</label>
          <input type="text" id="editItemName" placeholder="Dish name..." required />
        </div>
        
        <div class="form-group">
          <label>Description</label>
          <textarea id="editDescription" rows="3" placeholder="Describe the flavors..."></textarea>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
          <div class="form-group" style="margin-bottom:0;">
            <label>Category</label>
            <select id="editCategory" required>
              <option value="" disabled selected>Loading...</option>
            </select>
          </div>
          <div class="form-group" style="margin-bottom:0;">
            <label>Food Type</label>
            <select id="editFoodType" required>
              <option value="" disabled>Select Type</option>
              <option value="Veg">Pure Veg</option>
              <option value="Non-Veg">Non-Veg</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Price (Default/Single)</label>
          <input type="number" step="0.01" id="editPrice" required>
        </div>
        <div id="editTieredPriceContainer" style="display: none; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px;">
          <div class="form-group" style="margin-bottom:0;">
            <label style="font-size: 0.75rem;">Price (Quarter)</label>
            <input type="number" step="0.01" id="editPriceQuarter" placeholder="Quarter">
          </div>
          <div class="form-group" style="margin-bottom:0;">
            <label style="font-size: 0.75rem;">Price (Half)</label>
            <input type="number" step="0.01" id="editPriceHalf" placeholder="Half">
          </div>
          <div class="form-group" style="margin-bottom:0;">
            <label style="font-size: 0.75rem;">Price (Full)</label>
            <input type="number" step="0.01" id="editPriceFull" placeholder="Full">
          </div>
        </div>
        
        <div class="form-group">
          <label>Update Image</label>
          <div class="image-upload-wrapper">
            <input type="file" id="editItemImage" accept="image/*" />
            <div id="currentImagePreview" class="image-preview-container"></div>
            <label class="remove-image-label">
              <input type="checkbox" id="removeImage" />
              <span>Remove existing image</span>
            </label>
          </div>
        </div>
        
        <div class="form-checkbox-row">
          <label class="custom-checkbox">
            <input type="checkbox" id="editIsSpecial" />
            <span>Special</span>
          </label>
          <label class="custom-checkbox">
            <input type="checkbox" id="editIsAvailable" />
            <span>Available</span>
          </label>
        </div>
        
        <div class="modal-actions">
          <button type="submit" class="primary-btn">Save Changes</button>
          <button type="button" class="cancel-btn" onclick="closeEditModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Quick Add Item Modal (for Add-ons) -->
  <div id="quickAddModal" class="modal">
    <div class="modal-content" style="max-width: 400px; background: #0f172a;">
      <div class="modal-header">
        <h2 style="color: var(--primary);">➕ Quick Add Item</h2>
        <button class="small-btn delete-btn" onclick="closeQuickAdd()">&times;</button>
      </div>
      <form id="quickAddForm" style="padding: 20px;">
        <input type="hidden" id="quickAddOrderId" />
        <div class="form-group" style="margin-bottom: 20px;">
          <label style="color: var(--text-main); display: block; margin-bottom: 8px;">Select Food / Add-on</label>
          <select id="quickAddItemSelect" style="width: 100%; padding: 12px; border-radius: 8px; background: #1e293b; color: white; border: 1px solid #334155;" required>
            <!-- Menu items populated via JS -->
          </select>
        </div>
        <div class="form-group" style="margin-bottom: 25px;">
          <label style="color: var(--text-main); display: block; margin-bottom: 8px;">Quantity</label>
          <input type="number" id="quickAddQuantity" value="1" min="1" style="width: 100%; padding: 12px; border-radius: 8px; background: #1e293b; color: white; border: 1px solid #334155;" required />
        </div>
        <div style="display: flex; gap: 12px;">
          <button type="submit" class="primary-btn" style="flex: 1;">Add to Order</button>
          <button type="button" class="small-btn edit-btn" onclick="closeQuickAdd()" style="padding: 12px 20px;">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Take Order Modal -->
  <div id="takeOrderModal" class="modal">
    <div class="modal-content" style="max-width: 600px;">
      <div class="modal-header">
        <h2>🛍️ Take New Order</h2>
        <button class="close-btn" onclick="closeTakeOrderModal()">&times;</button>
      </div>
      
      <div style="padding: 20px;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
          <div class="form-group">
            <label>Order Type</label>
            <select id="newOrderType" onchange="toggleTableInput()" style="width:100%; padding:10px; background:#1e293b; color:white; border-radius:8px; border:1px solid #334155;">
              <option value="Parcel">Parcel</option>
              <option value="Dine-in">Dine-in</option>
            </select>
          </div>
          <div class="form-group" id="tableInputGroup" style="display:none;">
            <label>Table Number</label>
            <input type="text" id="newOrderTable" placeholder="e.g. 05" style="width:100%; padding:10px; background:#1e293b; color:white; border-radius:8px; border:1px solid #334155;" />
          </div>
        </div>
        
        <div class="form-group" style="margin-bottom: 20px;">
          <label>Customer Name / Phone (Optional)</label>
          <input type="text" id="newOrderCustomer" placeholder="e.g. John Doe" style="width:100%; padding:10px; background:#1e293b; color:white; border-radius:8px; border:1px solid #334155;" />
        </div>

        <div style="border: 1px solid #334155; border-radius: 12px; padding: 15px; background: rgba(0,0,0,0.2);">
          <label style="display:block; margin-bottom:10px; font-weight:600;">Select Items</label>
          <div style="display:flex; gap:10px; margin-bottom:15px;">
            <select id="modalItemSelect" style="flex:1; padding:10px; background:#1e293b; color:white; border-radius:8px; border:1px solid #334155;">
              <!-- Populated by JS -->
            </select>
            <input type="number" id="modalItemQty" value="1" min="1" style="width:70px; padding:10px; background:#1e293b; color:white; border-radius:8px; border:1px solid #334155;" />
            <button class="primary-btn" onclick="addItemToNewOrder()" style="padding: 0 15px;">Add</button>
          </div>
          
          <div id="newOrderItemsList" style="max-height: 200px; overflow-y: auto; margin-bottom: 15px;">
            <p style="text-align:center; color: var(--text-muted); font-size: 0.9rem;">No items added yet</p>
          </div>
          
          <div style="display:flex; justify-content: space-between; align-items: center; border-top: 1px solid #334155; padding-top: 10px;">
            <span style="font-weight:600;">Total Amount:</span>
            <span id="newOrderTotal" style="font-size: 1.4rem; font-weight: 800; color: var(--primary);">₹0.00</span>
          </div>
        </div>

        <div style="display:flex; gap: 15px; margin-top: 25px;">
          <button class="primary-btn" onclick="submitNewOrder()" style="flex:2;">Place Order</button>
          <button class="cancel-btn" onclick="closeTakeOrderModal()" style="flex:1;">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/dashboard.js"></script>
</body>
</html>
